        <hr style="margin: 6px 0;">

    <div id="live-panel" style="position: fixed; top: 10px; right: 10px; z-index: 1000;
                background: white; padding: 14px 18px; border-radius: 8px; width: 320px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-family: Arial, sans-serif;
                max-height: 90vh; overflow-y: auto; font-size: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h4 style="margin: 0; font-size: 14px;">Live Conditions</h4>
            <span id="live-dot" style="width:8px;height:8px;background:#4CAF50;border-radius:50%;display:inline-block;" title="Live"></span>
        </div>

        <div id="alerts-section">
            <b>Weather Alerts</b>
            <div id="alerts-content" style="margin: 4px 0 8px 0; color: #666;">Checking...</div>
        </div>

        <div id="rivers-section">
            <b>River Gauges</b>
            <div id="rivers-content" style="margin: 4px 0 8px 0; color: #666;">Loading...</div>
        </div>

        <div id="forecast-section">
            <b>Forecast</b>
            <div id="forecast-content" style="margin: 4px 0 8px 0; color: #666;">Loading...</div>
        </div>

        <div style="margin-top: 8px; border-top: 1px solid #eee; padding-top: 6px; color: #aaa; font-size: 10px;">
            Data from NWS &amp; USGS | Refreshes on each visit
        </div>
    </div>

    <script>
    const NWS_ZONES = ['NJZ104', 'NJZ103', 'NJZ106', 'NJZ105'];
    const RIVER_GAUGES = {
        '01378500': 'Hackensack @ New Milford',
        '01389500': 'Passaic @ Little Falls',
        '01391500': 'Saddle @ Lodi',
        '01388500': 'Pompton @ Pompton Plains',
        '01389005': 'Passaic @ Paterson'
    };
    const RESTORATION_EVENTS = [
        'Flood Warning', 'Flood Watch', 'Flash Flood Warning', 'Flash Flood Watch',
        'Coastal Flood Warning', 'River Flood Warning', 'Severe Thunderstorm Warning',
        'Hurricane Warning', 'Tropical Storm Warning', 'Winter Storm Warning',
        'Ice Storm Warning', 'High Wind Warning', 'Freeze Warning', 'Hard Freeze Warning'
    ];

    async function fetchAlerts() {
        const el = document.getElementById('alerts-content');
        try {
            const zoneParam = NWS_ZONES.join(',');
            const resp = await fetch(
                `https://api.weather.gov/alerts/active?zone=${zoneParam}&status=actual`,
                { headers: { 'User-Agent': 'VodaBergenCounty/1.0', 'Accept': 'application/geo+json' } }
            );
            const data = await resp.json();
            const features = data.features || [];
            const relevant = features.filter(f => RESTORATION_EVENTS.includes(f.properties.event));

            if (relevant.length === 0 && features.length === 0) {
                el.innerHTML = '<span style="color: #4CAF50;">No active alerts</span>';
            } else if (relevant.length === 0) {
                el.innerHTML = `<span style="color: #8BC34A;">${features.length} alert(s) - none restoration-relevant</span>`;
            } else {
                el.innerHTML = relevant.map(f => {
                    const p = f.properties;
                    const sev = p.severity === 'Extreme' || p.severity === 'Severe'
                        ? 'color:#D32F2F;font-weight:bold;'
                        : 'color:#FF9800;font-weight:bold;';
                    return `<div style="margin: 4px 0; padding: 6px; background: #FFF3E0; border-radius: 4px;">
                        <span style="${sev}">${p.event}</span><br>
                        <span style="font-size:11px;">${(p.headline || '').substring(0, 120)}</span>
                    </div>`;
                }).join('');
            }
        } catch (e) {
            el.innerHTML = '<span style="color:#999;">Could not load alerts</span>';
        }
    }

    async function fetchRivers() {
        const el = document.getElementById('rivers-content');
        try {
            const sites = Object.keys(RIVER_GAUGES).join(',');
            const resp = await fetch(
                `https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${sites}&parameterCd=00065&siteStatus=active`
            );
            const data = await resp.json();
            const timeSeries = data.value.timeSeries || [];

            let html = '<table style="width:100%;font-size:11px;border-collapse:collapse;">';
            timeSeries.forEach(ts => {
                const siteCode = ts.sourceInfo.siteCode[0].value;
                const name = RIVER_GAUGES[siteCode] || siteCode;
                const vals = ts.values[0].value;
                if (vals.length > 0) {
                    const height = parseFloat(vals[vals.length - 1].value);
                    let status = '#4CAF50', label = 'Normal';
                    if (height > 8) { status = '#D32F2F'; label = 'FLOOD'; }
                    else if (height > 6) { status = '#FF9800'; label = 'Elevated'; }
                    html += `<tr>
                        <td style="padding:3px 4px;">${name}</td>
                        <td style="padding:3px 4px;text-align:right;font-weight:bold;">${height.toFixed(1)} ft</td>
                        <td style="padding:3px 4px;text-align:right;color:${status};font-weight:bold;">${label}</td>
                    </tr>`;
                }
            });
            html += '</table>';
            el.innerHTML = html;
        } catch (e) {
            el.innerHTML = '<span style="color:#999;">Could not load river data</span>';
        }
    }

    async function fetchForecast() {
        const el = document.getElementById('forecast-content');
        try {
            const pointResp = await fetch(
                'https://api.weather.gov/points/40.8859,-74.0435',
                { headers: { 'User-Agent': 'VodaBergenCounty/1.0' } }
            );
            const pointData = await pointResp.json();
            const forecastUrl = pointData.properties.forecast;

            const forecastResp = await fetch(forecastUrl,
                { headers: { 'User-Agent': 'VodaBergenCounty/1.0' } }
            );
            const forecastData = await forecastResp.json();
            const periods = forecastData.properties.periods.slice(0, 6);

            let html = '';
            periods.forEach(p => {
                const precip = p.probabilityOfPrecipitation?.value || 0;
                let precipStyle = '';
                if (precip >= 70) precipStyle = 'color:#D32F2F;font-weight:bold;';
                else if (precip >= 40) precipStyle = 'color:#FF9800;';
                html += `<div style="padding: 3px 0; border-bottom: 1px solid #f0f0f0;">
                    <b>${p.name}</b>: ${p.shortForecast}, ${p.temperature}F
                    <span style="${precipStyle}"> ${precip}% precip</span>
                </div>`;
            });
            el.innerHTML = html;
        } catch (e) {
            el.innerHTML = '<span style="color:#999;">Could not load forecast</span>';
        }
    }

    async function refreshAll() {
        document.getElementById('live-timestamp').textContent =
            'Updated: ' + new Date().toLocaleString();
        await Promise.all([fetchAlerts(), fetchRivers(), fetchForecast()]);
    }

    refreshAll();
    </script>
